name: offline_pocket
description: "Offline-first, encrypted digital wallet for physical cards and IDs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (SQLCipher-encrypted SQLite + field-level AES-256-GCM)
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  sqlcipher_flutter_libs: ^0.7.0
  sqlite3: ^2.4.0

  # Secure storage & crypto (Android Keystore backed)
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.9.1

  # Biometric authentication
  local_auth: ^2.3.0

  # On-device OCR (no network calls)
  google_mlkit_text_recognition: ^0.13.0

  # Camera for card scanning
  camera: ^0.11.0

  # Navigation
  go_router: ^14.2.0

  # Utilities
  path_provider: ^2.1.4
  path: ^1.9.1
  uuid: ^4.4.2
  permission_handler: ^11.3.1

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/config.json
