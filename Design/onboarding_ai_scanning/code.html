<script>
        // Micro-interaction: Subtle card tilting based on mouse position (for desktop)
        const mainVisual = document.querySelector('main > div:first-child');
        const cardFrame = mainVisual.querySelector('.border-2');

        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            
            cardFrame.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset transform when mouse leaves
        document.addEventListener('mouseleave', () => {
            cardFrame.style.transform = `rotateY(0deg) rotateX(0deg)`;
            cardFrame.style.transition = 'all 0.5s ease';
        });

        document.addEventListener('mouseenter', () => {
            cardFrame.style.transition = 'none';
        });
    </script>
