<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>offlinePocket - AI Card Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#dbe4e8",
                        "on-primary-container": "#006c71",
                        "secondary-container": "#374a50",
                        "on-surface": "#dbe4e8",
                        "surface-tint": "#00dce5",
                        "secondary": "#b6cad1",
                        "on-error": "#690005",
                        "on-primary-fixed-variant": "#004f53",
                        "primary": "#e9feff",
                        "on-tertiary-fixed-variant": "#3e484d",
                        "surface-variant": "#2e3639",
                        "on-secondary-fixed": "#0b1e24",
                        "surface-container-lowest": "#070f12",
                        "inverse-on-surface": "#2a3235",
                        "surface": "#0d1518",
                        "on-primary-fixed": "#002021",
                        "inverse-primary": "#00696e",
                        "tertiary": "#f3fbff",
                        "primary-fixed-dim": "#00dce5",
                        "surface-container-high": "#232b2e",
                        "on-primary": "#003739",
                        "surface-container-low": "#151d20",
                        "on-secondary-fixed-variant": "#374a50",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#131d21",
                        "on-tertiary": "#283236",
                        "outline": "#849495",
                        "tertiary-fixed": "#d9e4e9",
                        "on-tertiary-container": "#586367",
                        "on-secondary": "#213339",
                        "surface-container-highest": "#2e3639",
                        "secondary-fixed": "#d2e6ed",
                        "secondary-fixed-dim": "#b6cad1",
                        "outline-variant": "#3a494a",
                        "on-secondary-container": "#a5b8c0",
                        "primary-container": "#00f5ff",
                        "tertiary-container": "#d4dfe4",
                        "surface-dim": "#0d1518",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#192124",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#bdc8cd",
                        "surface-bright": "#323a3e",
                        "on-background": "#dbe4e8",
                        "background": "#0d1518",
                        "on-surface-variant": "#b9caca",
                        "primary-fixed": "#63f7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "2xl": "48px",
                        "margin-mobile": "16px",
                        "xs": "4px",
                        "base": "4px",
                        "lg": "24px",
                        "gutter": "20px",
                        "margin-desktop": "40px",
                        "sm": "8px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Geist"],
                        "label-md": ["JetBrains Mono"],
                        "body-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-md": ["Geist"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .scan-frame-gradient {
            background: linear-gradient(to right, #00f5ff 2px, transparent 2px) 0 0,
                        linear-gradient(to right, #00f5ff 2px, transparent 2px) 0 100%,
                        linear-gradient(to left, #00f5ff 2px, transparent 2px) 100% 0,
                        linear-gradient(to left, #00f5ff 2px, transparent 2px) 100% 100%,
                        linear-gradient(to bottom, #00f5ff 2px, transparent 2px) 0 0,
                        linear-gradient(to bottom, #00f5ff 2px, transparent 2px) 100% 0,
                        linear-gradient(to top, #00f5ff 2px, transparent 2px) 0 100%,
                        linear-gradient(to top, #00f5ff 2px, transparent 2px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 24px 24px;
        }

        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f5ff, transparent);
            box-shadow: 0 0 20px #00f5ff;
            animation: scan 3.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }

        .pulse-glow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px #00f5ff); }
            50% { opacity: .7; filter: drop-shadow(0 0 3px #00f5ff); }
        }

        .floating-tag {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 245, 255, 0.15);
        }

        .cyber-button-glow:active {
            box-shadow: inset 0 0 15px rgba(0, 245, 255, 0.6);
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 z-50 bg-background/60 backdrop-blur-xl absolute top-0 left-0">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-primary-container">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary-container text-center flex-grow">offlinePocket Scanner</h1>
<div class="w-10"></div>
</header>
<!-- Camera Feed Mockup Container -->
<main class="flex-grow relative w-full flex items-center justify-center overflow-hidden bg-black">
<!-- Live Feed Simulation Image -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-40 grayscale-[0.3]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDRTjREFxKxF1HdAFo8XRw_3o5fUoKthIGWK0Cdj3v5xw0W2h8OaHfw_toKFQTXzq4HpRHV2ldMucsMUWtSv3ujfQ1BP455VAi-VvFKnToEERhEOrbxqxst8EOPfqEPGbxz2Bb_6tbe7GMiTLq2_s0yzqLBZYWTGjMOOskYIfOo-g-CX-9jQbDsAdx7ziyQabJLastxrQ1kCWYSD-DcpD-aU37AHurI8lVhjEuYdcHtzJaz6CRWGw7PWrAVKeBQbkxQDYQ5IVfv-M4')"></div>
</div>
<!-- Scanning Overlay Layer -->
<div class="relative z-10 w-full max-w-sm aspect-[1.58/1] mx-margin-mobile">
<!-- The Scanning Frame -->
<div class="absolute inset-0 scan-frame-gradient rounded-xl border border-primary-container/10 bg-primary-container/5 backdrop-blur-[1px]">
<div class="scanning-line absolute w-full left-0"></div>
<!-- Corner Lock Indicators -->
<div class="absolute -top-1.5 -left-1.5 w-3 h-3 rounded-full bg-primary-container pulse-glow"></div>
<div class="absolute -top-1.5 -right-1.5 w-3 h-3 rounded-full bg-primary-container pulse-glow"></div>
<div class="absolute -bottom-1.5 -left-1.5 w-3 h-3 rounded-full bg-primary-container pulse-glow"></div>
<div class="absolute -bottom-1.5 -right-1.5 w-3 h-3 rounded-full bg-primary-container pulse-glow"></div>
</div>
<!-- Floating Data Tags -->
<div class="absolute top-[15%] left-[8%] floating-tag bg-surface-container/80 px-4 py-2 rounded-lg flex flex-col gap-1 animate-pulse" style="opacity: 0.8;">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container shadow-[0_0_8px_#00f5ff]"></span>
<span class="font-label-sm text-label-sm text-primary-container uppercase">Parsing</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">NAME...</span>
</div>
<div class="absolute top-[45%] left-[20%] floating-tag bg-surface-container/80 px-4 py-2 rounded-lg flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary-container">check_circle</span>
<span class="font-label-sm text-label-sm text-primary-container uppercase">Card Number</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">LOCKED</span>
</div>
<div class="absolute bottom-[15%] right-[8%] floating-tag bg-surface-container/80 px-4 py-2 rounded-lg flex flex-col gap-1 animate-bounce" style="opacity: 0.8;">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary-container">hourglass_empty</span>
<span class="font-label-sm text-label-sm text-primary-container uppercase">Expiry</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">12/28</span>
</div>
</div>
<!-- Scanning Instruction -->
<div class="absolute bottom-44 w-full px-10 text-center z-20">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] bg-surface-container-lowest/60 py-3 rounded-full backdrop-blur-md border border-outline-variant/30 px-6">
                Align card within the frame
            </p>
</div>
</main>
<!-- Interaction Dock -->
<footer class="fixed bottom-0 w-full z-50 p-8 flex flex-col items-center gap-6 bg-gradient-to-t from-surface via-surface/95 to-transparent pb-12">
<!-- Main Action -->
<button class="w-full max-w-xs h-14 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full flex items-center justify-center gap-3 cyber-button-glow transition-all active:scale-95 shadow-[0_0_30px_rgba(0,245,255,0.4)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">scan</span>
            Scan Card
        </button>
<!-- Secondary Action -->
<a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[20px]">edit_document</span>
            Enter Details Manually
        </a>
<!-- Biometric Indicator -->
<div class="flex items-center gap-3 opacity-60">
<span class="material-symbols-outlined text-primary-container text-[20px]" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider">End-to-End Encrypted Session</span>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const floatingTags = document.querySelectorAll('.floating-tag');
            
            setInterval(() => {
                const tag = floatingTags[Math.floor(Math.random() * floatingTags.length)];
                tag.style.opacity = Math.random() > 0.3 ? '1' : '0.6';
            }, 1200);

            const btn = document.querySelector('button');
            btn.addEventListener('click', () => {
                btn.style.transform = 'scale(0.96)';
                setTimeout(() => btn.style.transform = 'scale(1)', 150);
            });
        });
    </script>
</body></html>
