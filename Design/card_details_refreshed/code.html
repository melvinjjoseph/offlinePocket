<style>

<body class="selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 z-50 bg-background/80 backdrop-blur-md sticky top-0 border-b border-outline-variant/30">
<div class="flex items-center gap-4">

<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-primary">Card Details</h1>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full glass-panel cyber-glow transition-all active:scale-95" id="master-toggle">
<span class="material-symbols-outlined text-primary-container" id="visibility-icon">visibility</span>
</button>
</div>
</header>
<main class="px-margin-mobile pb-32 max-w-md mx-auto">
<!-- Brand Styled Card Representation -->
<section class="mt-lg">
<div class="vault-card-gradient w-full aspect-[1.586/1] rounded-xl border border-outline/30 p-6 flex flex-col justify-between shadow-2xl relative transition-all duration-500" id="credit-card">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-primary-container opacity-90 uppercase">Visa Signature</span>
<div class="mt-2 w-12 h-9 bg-surface-container rounded border border-outline-variant/40 flex items-center justify-center">
<!-- Simulating a chip with brand colors -->
<div class="grid grid-cols-2 gap-px w-8 h-6 bg-primary-container/10 rounded-sm">
<div class="border-[0.5px] border-outline-variant/20"></div>
<div class="border-[0.5px] border-outline-variant/20"></div>
<div class="border-[0.5px] border-outline-variant/20"></div>
<div class="border-[0.5px] border-outline-variant/20"></div>
</div>
</div>
</div>
<span class="material-symbols-outlined text-4xl text-primary-container/20" style="font-variation-settings: 'FILL' 1;">contactless</span>
</div>
<div class="flex flex-col gap-1">
<!-- Revealed Numbers Area -->
<p class="font-label-md text-xl tracking-[0.15em] text-primary selection:bg-transparent" id="card-num-display">
                        4532 7812 9010 4452
                    </p>
<div class="flex gap-4 mt-2">
<div class="flex flex-col">
<span class="text-[10px] font-label-sm text-on-surface-variant uppercase tracking-wider">Expires</span>
<span class="font-label-md text-sm text-on-surface" id="expiry-display">12/28</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-label-sm text-on-surface-variant uppercase tracking-wider">CVV</span>
<span class="font-label-md text-sm text-on-surface" id="cvv-display">882</span>
</div>
</div>
</div>
<div class="flex justify-between items-end">
<span class="text-body-md font-body-md text-on-surface font-medium uppercase tracking-wider">Alex Sterling</span>
<div class="italic font-bold text-2xl text-on-surface/10">VISA</div>
</div>
</div>

<!-- Detail List -->
<section class="mt-xl space-y-gutter">
<!-- Full Name -->
<div class="p-md rounded-xl bg-surface-container-low border border-outline/20 flex flex-col gap-1">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase">Full Name</label>
<div class="flex justify-between items-center">
<span class="text-headline-md font-headline-md text-on-surface">Alex Sterling</span>
</div>
</div>
<!-- Card Number -->
<div class="p-md rounded-xl bg-surface-container-low border border-outline/20 flex flex-col gap-1">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase">Card Number</label>
<div class="flex justify-between items-center">
<span class="font-label-md text-body-md text-primary-fixed-dim tracking-wider" id="raw-card-number">4532 7812 9010 4452</span>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-primary-container/20 text-primary-container bg-primary-container/5 hover:bg-primary-container/10 transition-colors" onclick="copyToClipboard('4532781290104452')">
<span class="material-symbols-outlined text-[18px]">content_copy</span>

</button>

<!-- Secure Clipboard Banner -->
<div class="fixed bottom-lg left-margin-mobile right-margin-mobile z-[60] translate-y-32 transition-transform duration-500 ease-out" id="clipboard-toast">
<div class="glass-panel rounded-xl p-md flex items-center justify-between border-primary-container/30 cyber-glow">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[20px]">shield</span>
</div>
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-primary-container uppercase">Secure Clipboard</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Clear in <span class="" id="timer">45</span>s</span>
</div>
</div>
<div class="w-10 h-10 relative flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-outline-variant/30" cx="20" cy="20" fill="transparent" r="16" stroke="currentColor" stroke-width="2"></circle>
<circle class="text-primary-container transition-all duration-1000 linear" cx="20" cy="20" fill="transparent" id="timer-progress" r="16" stroke="currentColor" stroke-dasharray="100.5" stroke-dashoffset="0" stroke-width="2"></circle>
</svg>
</div>
</div>
</div>
<script>
        let isRevealed = true;
        const masterToggle = document.getElementById('master-toggle');
        const visibilityIcon = document.getElementById('visibility-icon');
        const cardNumDisplay = document.getElementById('card-num-display');
        const expiryDisplay = document.getElementById('expiry-display');
        const cvvDisplay = document.getElementById('cvv-display');
        const cvvMask = document.getElementById('cvv-mask');
        const rawCardNum = document.getElementById('raw-card-number');

        const FULL_CARD = "4532 7812 9010 4452";
        const MASKED_CARD = "•••• •••• •••• 4452";
        const FULL_EXP = "12/28";
        const MASKED_EXP = "••/••";
        const FULL_CVV = "882";
        const MASKED_CVV = "•••";

        masterToggle.addEventListener('click', () => {
            isRevealed = !isRevealed;
            
            if (isRevealed) {
                visibilityIcon.innerText = 'visibility';
                cardNumDisplay.innerText = FULL_CARD;
                expiryDisplay.innerText = FULL_EXP;
                cvvDisplay.innerText = FULL_CVV;
                rawCardNum.innerText = FULL_CARD;
                cvvMask.classList.add('hidden');
                masterToggle.classList.add('cyber-glow');
            } else {
                visibilityIcon.innerText = 'visibility_off';
                cardNumDisplay.innerText = MASKED_CARD;
                expiryDisplay.innerText = MASKED_EXP;
                cvvDisplay.innerText = MASKED_CVV;
                rawCardNum.innerText = MASKED_CARD;
                cvvMask.classList.remove('hidden');
                masterToggle.classList.remove('cyber-glow');
            }
        });

        // Clipboard Logic
        let timerInterval;
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showClipboardToast();
            });
        }

        function showClipboardToast() {
            const toast = document.getElementById('clipboard-toast');
            const timerSpan = document.getElementById('timer');
            const progress = document.getElementById('timer-progress');
            
            clearInterval(timerInterval);
            toast.classList.remove('translate-y-32');
            
            let timeLeft = 45;
            timerSpan.innerText = timeLeft;
            progress.style.strokeDashoffset = 0;

            timerInterval = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;
                
                // Update circle progress (circumference is ~100.5)
                const offset = 100.5 - (timeLeft / 45) * 100.5;
                progress.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    toast.classList.add('translate-y-32');
                }
            }, 1000);
        }
    </script>
</body></html>
