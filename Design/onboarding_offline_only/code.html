<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background-image: radial-gradient(circle at 2px 2px, #ffffff08 1px, transparent 0);

        }
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }

    body {

<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor (As per Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface flex items-center justify-between px-margin-mobile h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-headline-md text-headline-md-mobile text-primary-fixed-dim tracking-tighter">offlinePocket</span>
</div>
<button class="font-label-md text-label-md text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform">Skip</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile relative circuit-bg">
<!-- Abstract Security Visualization -->
<div class="w-full max-w-md aspect-square relative flex items-center justify-center mb-xl fade-in-up">
<!-- Background Halo -->
<div class="absolute inset-0 rounded-full border border-outline-variant/20 scale-125 opacity-30"></div>
<div class="absolute inset-0 rounded-full border border-outline-variant/10 scale-150 opacity-10"></div>
<!-- Central Visual Core -->
<div class="relative z-10 w-64 h-64 bg-gradient-to-br from-surface-container-high to-surface-container-lowest rounded-full border border-white/10 flex items-center justify-center shadow-2xl">
<!-- Disconnected Network Icon -->
<div class="relative flex flex-col items-center text-primary-container">
<span class="material-symbols-outlined text-[120px] glow-cyan" style="font-variation-settings: 'wght' 200;">cloud_off</span>
<!-- Floating Data Packets (Static but positioned) -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-surface-container-highest border border-white/10 rounded-lg flex items-center justify-center rotate-12">
<span class="material-symbols-outlined text-sm text-outline">link_off</span>
</div>
<div class="absolute bottom-0 -left-8 w-14 h-14 bg-surface-container-highest border border-white/10 rounded-lg flex items-center justify-center -rotate-12">
<span class="material-symbols-outlined text-sm text-outline">signal_cellular_connected_no_internet_4_bar</span>
</div>
</div>
<!-- Inner Security Ring -->
<div class="absolute inset-4 rounded-full border-2 border-dashed border-primary-container/20 animate-[spin_20s_linear_infinite]"></div>
</div>
<!-- JetBrains Mono Badge Overlay -->
<div class="absolute bottom-4 bg-primary-container/10 border border-primary-container/30 px-3 py-1 rounded-full backdrop-blur-md">
<span class="font-label-sm text-label-sm text-primary-container">NETWORK_STATUS: OFFLINE</span>
</div>
</div>
<!-- Copy Content -->
<div class="text-center max-w-sm fade-in-up" style="animation-delay: 0.2s;">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-md">True Privacy</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                No accounts. No trackers. Zero network calls. Your data is your own, completely sandboxed.
            </p>
</div>
<!-- Interactive Detail: The Sandbox Indicator -->
<div class="mt-xl grid grid-cols-2 gap-4 w-full max-w-sm fade-in-up" style="animation-delay: 0.4s;">
<div class="bg-surface-container p-sm border border-outline-variant rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">switch_account</span>
<span class="font-label-sm text-label-sm uppercase opacity-70">Vault Storage</span>
</div>
<div class="bg-surface-container p-sm border border-outline-variant rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<span class="font-label-sm text-label-sm uppercase opacity-70">Zero Telemetry</span>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (As per Shared Components JSON) -->

</div>
<!-- Navigation Action -->
<button class="bg-primary-container text-on-primary-container rounded-full p-4 shadow-[0px_0px_12px_#00f5ff33] hover:text-primary-fixed-dim transition-colors active:scale-90 transition-all duration-200 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<!-- Ambient Animation Layer -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/5 rounded-full blur-[128px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary-fixed-dim/5 rounded-full blur-[96px]"></div>
</div>
<script>
        // Micro-interaction for the central icon
        const visual = document.querySelector('.glow-cyan');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            visual.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Add "active" status from JSON logic simulation
        console.log('Rendering: Onboarding Step 3');
    </script>
