<style>

<body class="flex flex-col min-h-screen font-body-md text-body-md antialiased">

<div class="relative z-10 mb-xl">
<div class="w-48 h-48 vault-gradient border border-[#ffffff15] rounded-full flex items-center justify-center relative glow-cyan">

<!-- Shield Icon -->

<span class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest">Encrypted</span>
</div>
</div>
</div>

<!-- UI Interaction Scripts -->
<script>
        function handleStart() {
            // Visual feedback for interaction
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Initializing Vault...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Vault Ready';
                btn.classList.replace('bg-primary-container', 'bg-green-500');
                btn.classList.replace('text-on-primary', 'text-white');
            }, 1000);
        }

        // Parallax effect for the watermark logo
        document.addEventListener('mousemove', (e) => {
            const watermark = document.querySelector('.watermark-logo');
            if (watermark) {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                watermark.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.5) rotate(12deg)`;
            }
        });
    </script>
